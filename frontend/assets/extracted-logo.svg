<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Orange Fruit Sphere -->
  <circle cx="50" cy="58" r="32" fill="url(#orangeGrad)" />
  
  <!-- Slice texture line -->
  <path d="M50 26C31.2 26 18 39.2 18 58C18 76.8 31.2 90 50 90C68.8 90 82 76.8 82 58C82 39.2 68.8 26 50 26Z" stroke="white" stroke-width="1.5" stroke-opacity="0.12" />

  <!-- Fresh leaf -->
  <path d="M52 28C52 28 44 14 30 13C30 13 40 4 56 12C63 15.5 60 25 52 28Z" fill="url(#leafGrad)" />
  
  <!-- Secondary minor leaf -->
  <path d="M55 24C55 24 62 17 71 21C71 21 68 11 58 14C53 15.5 54 21 55 24Z" fill="url(#leafGradLight)" />

  <!-- Node stem -->
  <path d="M51 29C49 29 48 27 49 25C50 23 52 23 53 25C54 27 53 29 51 29Z" fill="#7C2D12" />

  <!-- Light gloss spec -->
  <ellipse cx="40" cy="46" rx="5" ry="3" transform="rotate(-30 40 46)" fill="white" fill-opacity="0.4" />

  <defs>
    <radialGradient id="orangeGrad" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(42 48) rotate(48) scale(40)">
      <stop offset="0%" stop-color="#FCA5A5" />
      <stop offset="35%" stop-color="#EA580C" />
      <stop offset="100%" stop-color="#7C2D12" />
    </radialGradient>
    <linearGradient id="leafGrad" x1="30" y1="13" x2="56" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#84CC16" />
      <stop offset="100%" stop-color="#15803D" />
    </linearGradient>
    <linearGradient id="leafGradLight" x1="58" y1="11" x2="71" y2="21" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A3E635" />
      <stop offset="100%" stop-color="#166534" />
    </linearGradient>
  </defs>
</svg>
